# ─────────────────────────────────────────────
# Starship Prompt
# ─────────────────────────────────────────────

# Timeout for commands (ms)
command_timeout = 1000

# Prompt format
format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$terraform\
$docker_context\
$kubernetes\
$cmd_duration\
$line_break\
$character"""

# Right-side prompt
right_format = """$time"""

# ── Character ─────────────────────────────────
[character]
success_symbol = "[❯](bold mauve)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

# ── Directory ─────────────────────────────────
[directory]
truncation_length = 3
truncation_symbol = "…/"
style = "bold lavender"
read_only = " 󰌾"
read_only_style = "red"

[directory.substitutions]
"~/Projects" = "  Projects"
"~/.dotfiles" = "  dotfiles"

# ── Git ───────────────────────────────────────
[git_branch]
symbol = " "
style = "bold mauve"
format = "[$symbol$branch(:$remote_branch)]($style) "

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold peach"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "\\$"
modified = "!${count}"
staged = "+${count}"
renamed = "»"
deleted = "✘"

# ── Languages ─────────────────────────────────
[python]
symbol = " "
style = "bold yellow"
format = '[$symbol$version(\($virtualenv\))]($style) '
detect_extensions = ["py"]
detect_files = ["requirements.txt", "setup.py", "pyproject.toml", "Pipfile"]

[nodejs]
symbol = " "
style = "bold green"
format = '[$symbol$version]($style) '
detect_extensions = ["js", "ts", "tsx", "jsx"]
detect_files = ["package.json"]

[rust]
symbol = "🦀 "
style = "bold red"
format = '[$symbol$version]($style) '

[golang]
symbol = " "
style = "bold cyan"
format = '[$symbol$version]($style) '

[terraform]
symbol = "󱁢 "
style = "bold blue"
format = '[$symbol$version]($style) '

# ── Infrastructure ────────────────────────────
[docker_context]
symbol = " "
style = "bold blue"
format = '[$symbol$context]($style) '
only_with_files = true

[kubernetes]
disabled = false
symbol = "☸ "
style = "bold blue"
format = '[$symbol$context(\($namespace\))]($style) '
detect_files = ["k8s", "kubernetes", "Helmfile.yaml"]
detect_folders = ["charts", "k8s", "kubernetes"]

[kubernetes.context_aliases]
"k3s-hetzner" = "hetzner"

# ── Metrics ───────────────────────────────────
[cmd_duration]
min_time = 2000
format = "[$duration]($style) "
style = "bold yellow"
show_notifications = false

[time]
disabled = false
format = '[$time]($style)'
style = "dimmed text"
time_format = "%H:%M"

# ── Disabled ──────────────────────────────────
[aws]
disabled = true

[gcloud]
disabled = true

[package]
disabled = true

[php]
disabled = true

[ruby]
disabled = true

[java]
disabled = true

# ── Palette (Catppuccin Mocha) ────────────────
palette = "catppuccin_mocha"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
