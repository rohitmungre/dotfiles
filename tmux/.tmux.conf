# ─────────────────────────────────────────────
# tmux Configuration
# ─────────────────────────────────────────────

# ── Prefix ────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ───────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 50000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -sg escape-time 0
set -g focus-events on
set -g status-interval 5

# ── Splits ────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Navigation (vim-style) ────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Resize ────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Windows ───────────────────────────────────
bind -r [ previous-window
bind -r ] next-window
bind Tab last-window
bind -r < swap-window -t -1\; select-window -t -1
bind -r > swap-window -t +1\; select-window -t +1

# ── Copy Mode (vi-style) ─────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel

# ── Quick Actions ─────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded"
bind z resize-pane -Z  # Zoom
bind s choose-tree -sZ # Session picker
bind x kill-pane       # Kill without confirm
bind X kill-session    # Kill session

# Lazygit popup
bind g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"

# ── Status Bar ────────────────────────────────
set -g status-position top
set -g status-style "bg=default,fg=#cdd6f4"
set -g status-left-length 60
set -g status-right-length 80

set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[fg=#89b4fa,bg=default] "
set -g status-right "#[fg=#6c7086]  %H:%M  %d %b #[fg=#cba6f7]  #{?client_prefix,PREFIX,} "

# Window status
set -g window-status-format "#[fg=#6c7086] #I:#W "
set -g window-status-current-format "#[fg=#cba6f7,bold] #I:#W "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# Messages
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g message-command-style "bg=#313244,fg=#cdd6f4"

# ── Plugins (TPM) ────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'    # Session persistence
set -g @plugin 'tmux-plugins/tmux-continuum'     # Auto-save sessions
set -g @plugin 'tmux-plugins/tmux-yank'          # System clipboard
set -g @plugin 'christoomey/vim-tmux-navigator'  # Seamless vim/tmux nav
set -g @plugin 'fcsonline/tmux-thumbs'           # Quick copy with hints

# Plugin config
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# ── Initialize TPM (keep at bottom) ──────────
run '~/.tmux/plugins/tpm/tpm'
